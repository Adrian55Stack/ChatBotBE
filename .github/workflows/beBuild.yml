name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  testCheck:
    name: TestCheckBE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install BE dependencies
        run: npm install

      - name: Run BE tests with coverage
        run: npm run test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}